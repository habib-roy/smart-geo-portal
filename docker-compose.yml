version: '3.8'

services:
  # 1. Martin Tile Server
  martin:
    image: maplibre/martin:latest
    container_name: smart_geo_martin
    restart: always
    env_file:
      - .env
    command: ${DATABASE_URL}
    ports:
      - "3333:3000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - geo_network

  # 2. FastAPI Backend
  api:
    build: ./backend
    container_name: smart_geo_api
    restart: always
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./backend/style:/app/style
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - geo_network

  # 3. React Frontend
  frontend:
    build: ./frontend
    container_name: smart_geo_frontend
    restart: always
    ports:
      - "8080:80"
    env_file:
      - .env
    depends_on:
      - api
    networks:
      - geo_network

  # 4. Maputnik Editor
  maputnik:
    image: ghcr.io/maplibre/maputnik:main
    container_name: smart_geo_maputnik
    restart: always
    volumes:
      - ./backend/style:/styles
    command: ["--file", "/styles/default.json", "--watch", "--port", "8000"]
    ports:
      - "8888:8000"
    networks:
      - geo_network

networks:
  geo_network:
    driver: bridge
